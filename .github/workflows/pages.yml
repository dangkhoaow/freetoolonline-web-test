name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 (full history) is required by scripts/page-mtimes.mjs
          # so per-page `git log -1` returns the actual most-recent commit that
          # touched each page's CMS fragments. Default fetch-depth: 1 yields
          # one shallow commit and every page receives the same stamp.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static site
        env:
          SOURCE_REPO_ROOT: ${{ github.workspace }}/source
          STAGING: 'true'
          SITE_URL: https://dangkhoaow.github.io/freetoolonline-web-test
          CANONICAL_ORIGIN: https://freetoolonline.com
          BASE_PATH: /freetoolonline-web-test
          WRITE_CNAME: 'false'
        run: npm run export

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
