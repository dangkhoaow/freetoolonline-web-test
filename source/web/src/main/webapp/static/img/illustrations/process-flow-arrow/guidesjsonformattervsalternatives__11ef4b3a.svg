<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-processflowarrow-30076a-title svg-processflowarrow-30076a-desc">
  <title id="svg-processflowarrow-30076a-title">When jq fits the shell pipeline: read, format, hand off</title>
  <desc id="svg-processflowarrow-30076a-desc">Show a shell stage: a JSON file is read from disk, jq formats and indents the structure, then the next command in the pipeline receives the cleaned output for further processing.</desc>
  <rect x="20" y="30" width="160" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">JSON file</text>
  <path d="M 190 60 L 230 60 M 220 50 L 230 60 L 220 70" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <rect x="240" y="30" width="160" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="320" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">jq format</text>
  <path d="M 410 60 L 450 60 M 440 50 L 450 60 L 440 70" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <rect x="460" y="30" width="160" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="540" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Piped to next step</text>
</svg>
