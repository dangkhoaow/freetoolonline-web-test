<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-decisiontree2branch-28409a-title svg-decisiontree2branch-28409a-desc">
  <title id="svg-decisiontree2branch-28409a-title">PNG vs JPG: which format to save each extracted frame</title>
  <desc id="svg-decisiontree2branch-28409a-desc">PNG preserves every pixel and transparency for re-editing; JPG produces smaller files for slide decks and feed posts.</desc>
  <rect x="120" y="20" width="240" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">How will you use the frame?</text>
  <path d="M 200 80 L 120 160 M 130 150 L 120 160 L 130 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <path d="M 280 80 L 360 160 M 350 150 L 360 160 L 350 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <rect x="20" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="120" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Re-edit, composite: pick PNG</text>
  <rect x="260" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="360" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Slide, feed post: pick JPG</text>
</svg>
