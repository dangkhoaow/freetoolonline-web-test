<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedsteprow-30c616-title svg-numberedsteprow-30c616-desc">
  <title id="svg-numberedsteprow-30c616-title">Pick the right zip tool and what online means here</title>
  <desc id="svg-numberedsteprow-30c616-desc">Use the creator at /zip-tools/zip-file.html; &quot;online&quot; means a private upload-then-build service, not browser-side; name the archive and add an optional password.</desc>
  <circle cx="100" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">1</text>
  <text x="100" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Pick creator</text>
  <path d="M 150 80 L 270 80 M 260 70 L 270 80 L 260 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="320" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="320" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">2</text>
  <text x="320" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Drop folder</text>
  <path d="M 370 80 L 490 80 M 480 70 L 490 80 L 480 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="540" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="540" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">3</text>
  <text x="540" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Name + key</text>
</svg>
