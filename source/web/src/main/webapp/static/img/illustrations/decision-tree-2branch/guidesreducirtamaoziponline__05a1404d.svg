<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-decisiontree2branch-96c910-title svg-decisiontree2branch-96c910-desc">
  <title id="svg-decisiontree2branch-96c910-title">When zip actually shrinks files</title>
  <desc id="svg-decisiontree2branch-96c910-desc">Pick whether to zip for size: a yes branch for compressible text and code, a no branch for already-compressed media.</desc>
  <rect x="120" y="20" width="240" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Will zip shrink my files?</text>
  <path d="M 200 80 L 120 160 M 130 150 L 120 160 L 130 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <path d="M 280 80 L 360 160 M 350 150 L 360 160 L 350 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <rect x="20" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="120" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">YES: text, code, CSV, JSON</text>
  <rect x="260" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="360" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">NO: photos, video, MP3, PDF</text>
</svg>
