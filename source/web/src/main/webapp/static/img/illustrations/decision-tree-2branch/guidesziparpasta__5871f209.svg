<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-decisiontree2branch-9364b9-title svg-decisiontree2branch-9364b9-desc">
  <title id="svg-decisiontree2branch-9364b9-title">Qual nivel de compressao usar na pasta ZIP</title>
  <desc id="svg-decisiontree2branch-9364b9-desc">Texto e codigo: nivel maximo reduz 40-60 por cento. Fotos e videos ja sao comprimidos pelo formato, entao a maxima pouco ajuda - reduza antes.</desc>
  <rect x="120" y="20" width="240" height="60" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Conteudo da pasta?</text>
  <path d="M 200 80 L 120 160 M 130 150 L 120 160 L 130 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <path d="M 280 80 L 360 160 M 350 150 L 360 160 L 350 170" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <rect x="20" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="120" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Texto/codigo: maximo</text>
  <rect x="260" y="170" width="200" height="80" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="360" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Foto/video: reduzir</text>
</svg>
