<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedsteprow-c2dde5-title svg-numberedsteprow-c2dde5-desc">
  <title id="svg-numberedsteprow-c2dde5-title">Three checks to land a ZIP under 2 MB</title>
  <desc id="svg-numberedsteprow-c2dde5-desc">Three steps to fit a folder under a 2 MB attachment cap: sort the inputs, leave the level slider on default, split the delivery when media stays bulky.</desc>
  <circle cx="100" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">1</text>
  <text x="100" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Sort inputs</text>
  <path d="M 150 80 L 270 80 M 260 70 L 270 80 L 260 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="320" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="320" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">2</text>
  <text x="320" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Keep default</text>
  <path d="M 370 80 L 490 80 M 480 70 L 490 80 L 480 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="540" cy="80" r="40" fill="#5B73AE" aria-hidden="true"/>
  <text x="540" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">3</text>
  <text x="540" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Split delivery</text>
</svg>
