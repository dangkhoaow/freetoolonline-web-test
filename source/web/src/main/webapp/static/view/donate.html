<style>
    .w3-white {
        color: #000!important;
        background-color: #fff!important;
    }

    .w3-black {
        color: #fff!important;
        background-color: #202124!important
    }


</style>
<div class="w3-modal" id="donate-confirm" style="display: block">
    <div class="w3-modal-content" style="padding: 10px; padding-top: 40px">
        <div class='w3-container'>
            <div class="w3-display-topleft" style="left: 10px;top: 10px;color: #0066b3;">Donate Us</div>
            <div class='w3-row'>
                <p>Looks like you have a good experience at this Tool? The server cost is enormous for delivering to you the best experience. So, could you possibly support for developing by donate to Us with PayPal?</p>
            </div>
            <br/>
            <div class="w3-row w3-right-align">
                <button class="w3-btn w3-black buy-me-a-coffee-btn" style="margin-left: 10px; margin-top: 10px;" onclick="window.open($('#buyMeACoffeeBtnID').attr('href'), '_blank');document.getElementById('donate-confirm').style.display='none';localStorage[pageName + '-downloaded'] = true">Donate via Buy Me A Coffee</button>
                <button class="w3-btn w3-black" style="margin-left: 10px; margin-top: 10px;" onclick="$('#donateBtnID').click();document.getElementById('donate-confirm').style.display='none';localStorage[pageName + '-downloaded'] = true">Donate via PayPal</button>
                <button class="w3-btn w3-white w3-border" style="margin-left: 10px; margin-top: 10px;" onclick="document.getElementById('donate-confirm').style.display='none';sessionStorage[pageName + '-downloaded'] = true">No thanks</button>
            </div>
        </div>
    </div>
</div>
<script>
function sendDonateDlgEv() {
	try {
		ga('send', {
			hitType: 'event',
			eventCategory: 'CVR',
			eventAction: minifyPageName(pageName) + 'dnt dlg opened',
			eventLabel: pageName
		});
	} catch (e) {}
};

function appendDonateBannerAd() {
	try {
		var donateBannerAdState = window.__donateBannerAdState = window.__donateBannerAdState || { loading: false, loaded: false };
		var noadsParam = typeof getParamValue === 'function' ? getParamValue('noads') : null;
		var disableAdCookie = typeof getCookie === 'function' ? getCookie('disableAd') : '';
		var existingSlotCount = $('#donate-confirm .donate-banner-ad-slot').length;
		console.log('[donate] appendDonateBannerAd start', {
			pageName: typeof pageName === 'undefined' ? '' : pageName,
			noadsParam: noadsParam,
			disableAdCookie: disableAdCookie,
			existingSlotCount: existingSlotCount,
			htmlAdsDisabled: $('html').hasClass('ads-disabled'),
			loading: donateBannerAdState.loading,
			loaded: donateBannerAdState.loaded
		});
		if (donateBannerAdState.loaded) {
			console.log('[donate] appendDonateBannerAd skipped because banner already loaded');
			return;
		}
		if (donateBannerAdState.loading) {
			console.log('[donate] appendDonateBannerAd skipped because load is already in progress');
			return;
		}
		if ((typeof getParamValue === 'function' && getParamValue('noads') != null) || (typeof getCookie === 'function' && getCookie('disableAd') !== '' && getCookie('disableAd') !== 'false')) {
			console.log('[donate] appendDonateBannerAd skipped because ads are disabled', {
				noadsParam: noadsParam,
				disableAdCookie: disableAdCookie
			});
			return;
		}
		if (existingSlotCount > 0) {
			donateBannerAdState.loaded = true;
			console.log('[donate] appendDonateBannerAd skipped because slot already exists');
			return;
		}
		donateBannerAdState.loading = true;
		var adFragmentUrl = 'view/top-page-banner-ad.html?v=' + APP_VERSION;
		console.log('[donate] loading donate banner ad fragment', { url: adFragmentUrl });
		$.ajax({
			context: this,
			dataType: "html",
			url: adFragmentUrl,
			success: function(result) {
				try {
					console.log('[donate] donate banner ad fragment loaded', {
						length: result ? result.length : 0
					});
					donateBannerAdState.loading = false;
					if ($('#donate-confirm .donate-banner-ad-slot').length > 0) {
						donateBannerAdState.loaded = true;
						console.log('[donate] appendDonateBannerAd skipped after load because slot already exists');
						return;
					}
					var $adContainer = $('<div class="donate-banner-ad-slot" style="margin-top: 12px;"></div>');
					$('#donate-confirm .w3-modal-content').append($adContainer);
					$adContainer.append(result);
					donateBannerAdState.loaded = true;
					console.log('[donate] donate banner ad appended; preparing adsbygoogle push');
					var pushAd = function() {
						try {
							console.log('[donate] adsbygoogle push invoked');
							(adsbygoogle = window.adsbygoogle || []).push({});
						} catch (e) {
							console.log('[donate] adsbygoogle push error', e);
						}
					};
					if (document.querySelector('script[src*="pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"]')) {
						console.log('[donate] adsbygoogle script already present');
						pushAd();
					} else if (typeof loadScript === 'function') {
						console.log('[donate] loading adsbygoogle script before push');
						loadScript('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', function() {
							console.log('[donate] adsbygoogle script loaded');
							pushAd();
						});
					} else {
						console.log('[donate] loadScript unavailable; pushing adsbygoogle directly');
						pushAd();
					}
				} catch (e) {
					donateBannerAdState.loading = false;
					console.log('[donate] appendDonateBannerAd success handler error', e);
				}
			},
			error: function(xhr, status, error) {
				donateBannerAdState.loading = false;
				console.log('[donate] failed to load donate banner ad fragment', {
					status: status,
					error: error
				});
			}
		});
	} catch (e) {
		console.log('[donate] appendDonateBannerAd outer error', e);
	}
}

window.__appendDonateBannerAd = appendDonateBannerAd;
sendDonateDlgEv();
appendDonateBannerAd();
</script>
