<style>
	.adslot_0 {

	}

	@media(max-width: 970px) {
	    .adslot_0 {
			width: 728px;
	    }
	}

	@media(max-width: 728px) {
	    .adslot_0 {
			width: 320px;
			height: 100px;
	    }
	}

	@media(max-width: 999px) {
		.ad-section.top-ad>ins:after {
			content: '';
			text-transform: uppercase;
			font-weight: bold;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
			padding: 10px;
		}
	}

	@media(min-width: 1000px) {
	    .ad-section.top-ad>ins:after {
			content: none !important;
		}
	}

	/* PLATFORM FIX (2026-05-11): un-hide top-ad sitewide at every viewport.
	 * common.css sets `.ad-section.top-ad { display: none }` as the initial
	 * state; upload-style.css (loaded only via <freetoolonline:upload>) then
	 * overrides with `display: block !important` for upload tools. Non-upload
	 * tools (md5-converter, camera-test, …) and guides never loaded that
	 * stylesheet, so their top-ad stayed display:none. The runtime gate at
	 * extended-body-content.html:198 requires `.adsbygoogle:visible.length
	 * > 0` before invoking `loadAds()`; without a visible slot it never
	 * fires and the ad chain dies — chicken-and-egg.
	 *
	 * Promoting this rule from upload-style.css to the sitewide top-ad
	 * fragment fixes the gate for every page that emits the top-ad slot,
	 * across mobile + desktop. The `.adslot_0` width/height rules above
	 * already responsively size the slot per viewport (970/728/320).
	 *
	 * Safe vs cycle-14e: top-ad is a 90-100 px horizontal band above main
	 * content, not the floated 160x600 ad-panel column. The cycle-14e
	 * `html.ads-disabled .ad-panel { display: none !important }` rule still
	 * gates the side panels, so the empty-ad-panel 600 px gap stays fixed.
	 */
	.ad-section.top-ad {
		display: block !important;
	}

	/* When ads are disabled (staging, ad blocker, or user toggle), collapse the
	 * top-ad slot so it doesn't reserve 90–100px and push first-fold content down.
	 */
	html.ads-disabled .ad-section.top-ad {
		display: none !important;
	}
</style>
