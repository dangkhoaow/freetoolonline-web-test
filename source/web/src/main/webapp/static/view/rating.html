<script>
    function resolveApiOrigin() {
        try {
            var origin = '';
            if (typeof API_ORIGIN !== 'undefined' && API_ORIGIN) {
                origin = API_ORIGIN;
            }
            origin = (origin || '').toString().trim();
            if (origin === '' || origin.indexOf('http') !== 0) {
                origin = 'https://service.us-east-1a.freetool.online/';
            }
            if (origin.charAt(origin.length - 1) !== '/') {
                origin = origin + '/';
            }
            return origin;
        } catch (e) {
            return 'https://service.us-east-1a.freetool.online/';
        }
    }

    setTimeout(function() {
        callAjax({},
            function(ratingInfo) {
                if (ratingInfo == null || typeof ratingInfo === 'undefined') {
                    ratingInfo = {
                        one: 0,
                        two: 0,
                        three: 0,
                        four: 0,
                        five: 1,
                        total: 1,
                        avg: 5
                    }
                }

                $('.rating-c .stars').find('.fa-star').each(function(index) {
                    if ((index + 1) <= Math.round(parseFloat(ratingInfo.avg))) {
                        $(this).addClass('checked');
                    }
                });

                $('#star-rating-container').find('.star-ratings-sprite-rating').css('width', 1.0 * parseFloat(ratingInfo.avg) / 5 * 100 + '%');
                $('#star-rating-container').find('.avgN').text(ratingInfo.avg);
                $('#star-rating-container').find('.totalN').text(ratingInfo.total);

                try {
                    $('.bar-container > .bar').each(function() {
                        if ($(this).hasClass('bar-5')) {
                            $(this).css('width', ((1.0 * parseInt(ratingInfo.five)) / parseInt(ratingInfo.total)) * 100 + '%');
                            $(this).closest('.middle').next().find('div').text(ratingInfo.five);
                        }
                        if ($(this).hasClass('bar-4')) {
                            $(this).css('width', ((1.0 * parseInt(ratingInfo.four)) / parseInt(ratingInfo.total)) * 100 + '%');
                            $(this).closest('.middle').next().find('div').text(ratingInfo.four);
                        }
                        if ($(this).hasClass('bar-3')) {
                            $(this).css('width', ((1.0 * parseInt(ratingInfo.three)) / parseInt(ratingInfo.total)) * 100 + '%');
                            $(this).closest('.middle').next().find('div').text(ratingInfo.three);
                        }
                        if ($(this).hasClass('bar-2')) {
                            $(this).css('width', ((1.0 * parseInt(ratingInfo.two)) / parseInt(ratingInfo.total)) * 100 + '%');
                            $(this).closest('.middle').next().find('div').text(ratingInfo.two);
                        }
                        if ($(this).hasClass('bar-1')) {
                            $(this).css('width', ((1.0 * parseInt(ratingInfo.one)) / parseInt(ratingInfo.total)) * 100 + '%');
                            $(this).closest('.middle').next().find('div').text(ratingInfo.one);
                        }
                    });
                } catch (e) {
                    console.log(e);
                }

                $('#star-rating-container .rating-c .fa-star').on('click', function() {
                    var proName = pageName + '-rated';
                    if (ratingCheckBase() && checkSessionIdAvallabel()) {
                        sessionStorage[proName] = true;
                        var ratingLevel = $(this).attr('data-level');
                        $('#star-rating-container .stars').css('opacity', '0.4');
                        callAjax({},
                            function(result) {
                                $('#star-rating-container').find('.rateSuccess').show();
                                $('#star-rating-container .stars').css('opacity', '1');
                            },
                            function() {
                                sessionStorage[proName] = false;
                                $('#star-rating-container .stars').css('opacity', '1');
                            },
                            resolveApiOrigin() + "ajax/do-rating?pageName=" + pageName + "&ratingLevel=" + ratingLevel + "&sessionId=" + web.id
                        );
                    }
                });
            },
            function() {
                $('#star-rating-container').parent().remove();
            },
            resolveApiOrigin() + 'ajax/get-rating?pageName=' + pageName
        );
    }, 1000);


    var DONATE_DLG_LOADED = false;

	function donateAsk() {
        if ($('.w3-rest.page-main-content').find('#donate-confirm').length == 0 && DONATE_DLG_LOADED == false) {
            DONATE_DLG_LOADED = true;
            $.ajax({
                context: this,
                dataType: "html",
                url: "view/donate.html?v=" + APP_VERSION,
                success: function(result) {
                    $('.w3-rest.page-main-content').append(result);
                }
            });
        } else {
            $('#donate-confirm').show();
            localStorage[proDName] = true;
        }

    function checkSessionIdAvallabel() {
        return typeof web.id !== "undefined" && web.id !== '' && web.id !== 'null' && web.id != null;
    }

    function ratingCheckBase() {
        return typeof sessionStorage[proName] === 'undefined' || sessionStorage[proName] === 'false';
    }

    function donateCheckShowBase() {
        var localSInfo = typeof localStorage[proDName] === 'undefined' || localStorage[proDName] === 'false';
        var sessionSInfo = typeof sessionStorage[proDName] === 'undefined' || sessionStorage[proDName] === 'false';
        return localSInfo && sessionSInfo;
    };
	
    function donateShowBaseCondition() {
        return donateCheckShowBase() && checkSessionIdAvallabel();

                    });

                var $size = $('.filelist li .progress, .uploadContainerSecond .filelistsSecond li .progress');
                if ($size.length > 0 && checkNeedToCalcUpldSize()) {

        window.onerror = function(msg, url, line, col, error) {
