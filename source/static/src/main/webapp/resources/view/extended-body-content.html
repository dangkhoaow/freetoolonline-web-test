<script>
    var darkTgl = document.getElementById('dark-tgl');
    var htmlRoot = document.getElementsByTagName('html')[0];
    var mainNav = document.getElementById('mainNavBar');
    var isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    function minifyPageName(pName) {
        if (pName) {
            if (pName.length > 13) {
                return pName.replaceAll(/-/g, '').substr(0, 10) + '... ';
            } else {
                return pName.replaceAll(/-/g, '').substr(0, 13) + ' ';
            }
        } else {
            return '';
        }
    };

    function getCookie(cname) {
        var name = cname + "=";
        var decodedCookie = decodeURIComponent(document.cookie);
        var ca = decodedCookie.split(';');
        for(var i = 0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) == ' ') {
            c = c.substring(1);
            }
            if (c.indexOf(name) == 0) {
            return c.substring(name.length, c.length);
            }
        }
        return "";
    };

    isLoadAds = isLoadAds && (getCookie('disableAd') === '' || getCookie('disableAd') === 'false');

    if (!isLoadAds) {
        document.querySelector('html.main-html').classList.add('ads-disabled');
        document.querySelectorAll('.ad-section' + (window.innerWidth < 1000 ? ':not(.top-ad)' : '')).forEach(function(element) {
            element.remove();
        });
    }

    if (isDarkMode) {
        try {
            ga('send', {
                hitType: 'event',
                eventCategory: 'Explore',
                eventAction: minifyPageName(pageName) + 'sys DM on',
                eventLabel: pageName
            });
        } catch (e) {}
    }

    if ((isDarkMode && typeof localStorage['dark'] === 'undefined') || localStorage['dark'] == true || localStorage['dark'] === 'true') {
        htmlRoot.className += ' dark';
        darkTgl ? (darkTgl.checked = true) : '';
    }

    if (darkTgl.checked) {
        try {
            ga('send', {
                hitType: 'event',
                eventCategory: 'Explore',
                eventAction: minifyPageName(pageName) + 'DM onload',
                eventLabel: pageName
            });
        } catch (e) {}
    }

    darkTgl ? darkTgl.addEventListener('change', (event) => {
        if (event.currentTarget.checked) {
            document.getElementsByTagName('html')[0].className += ' dark';
            mainNav.classList.add('w3-white');
            localStorage['dark'] = true;
        } else {
            document.getElementsByTagName('html')[0].classList.remove('dark');
            mainNav.classList.remove('w3-white');
            localStorage['dark'] = false;
        }
    }) : '';

    const MAX_DUR_SEC_ULD_EACH_FILE = 30;
    const AVG_FILE_PRC_DUR_SEC = 8;
    const DOWN_AND_UP_RATIO = 1.5;
    const AVG_FILE_SIZE_MB = 3;
    const TEST_ULD_SIZE_MB = 1;
    const DEFAULT_ULD_PARALLEL = 4;
    var IS_ADS_INIT = false;
</script>
<script src="https://dkbg1jftzfsd2.cloudfront.net/script/lib/jquery/1.12.4/jquery.min.js"></script>
<script>
    $(document).ready(function() {
        startScripts();
        $(document).on("click dblclick mousedown mouseup mousemove mouseenter mouseleave keydown keyup touchstart touchmove touchend", function(event) {
            try {
                if (IS_ADS_INIT == false) {
                    IS_ADS_INIT = true;
                    isLoadAds = isLoadAds && $('.ad-section > .adsbygoogle:visible').length > 0;
                    if (isLoadAds && getParamValue('noads') == null) {
                        loadAds();
                    } else {
                        document.querySelectorAll('.ad-section' + (w_winds < 1000 ? ':not(.top-ad)' : '')).forEach(function(element) {
                            element.remove();
                        });
                    }
                }
            } catch (e){}
        });

        if (!isLoadAds || getParamValue('noads') == null) {
            $('html.main-html').removeClass('ads-init');
        }
    });
</script>
