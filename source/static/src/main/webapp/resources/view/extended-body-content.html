<style type="text/css">             
    body,h1,h2,h3,h4,h5,h6 {
        font-family: 'Montserrat',sans-serif!important;
        letter-spacing: .3px;

<script>
    var darkTgl = document.getElementById('dark-tgl');
    var htmlRoot = document.getElementsByTagName('html')[0];
    var mainNav = document.getElementById('mainNavBar');
    var isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    function minifyPageName(pName) {
        if (pName) {
            if (pName.length > 13) {
                return pName.replaceAll(/-/g, '').substr(0, 10) + '... ';
            } else {
                return pName.replaceAll(/-/g, '').substr(0, 13) + ' ';
            }
        } else {
            return '';
        }
    };

    function getCookie(cname) {
        var name = cname + "=";
        var decodedCookie = decodeURIComponent(document.cookie);
        var ca = decodedCookie.split(';');
        for(var i = 0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) == ' ') {
            c = c.substring(1);
            }
            if (c.indexOf(name) == 0) {
            return c.substring(name.length, c.length);
            }
        }
        return "";
    };

    // QA / audit support: when `?noads=1` is present, remove ad containers immediately
    // (the legacy flow only removes them after the first user interaction).
    try {
        var __qaNoAds = false;
        try {
            __qaNoAds = new URLSearchParams(window.location.search).has('noads');
        } catch (e) {}
        if (__qaNoAds) {
            isLoadAds = false;
            try { htmlRoot && htmlRoot.classList && htmlRoot.classList.add('qa-noads'); } catch (e) {}
            try { window.__QA_NOADS_MODE__ = true; } catch (e) {}
            console.log('[qa:noads] noads param detected; forcing ads off at load.');
        }
    } catch (e) {}

    function __qaAlignFooterToHero() {
        if (!__qaNoAds) return;
        try {
            var heroEl = document.querySelector('#home > .main-text') || document.querySelector('.page-main-content .page-section');
            var footerEl = document.querySelector('footer.page-footer');
            var footerInnerEl = document.querySelector('footer.page-footer .footer-inner');
            if (!heroEl || !footerEl || !footerInnerEl) return;

            var hr = heroEl.getBoundingClientRect();
            var fr = footerEl.getBoundingClientRect();
            var fs = getComputedStyle(footerEl);
            var pl = parseFloat(fs.paddingLeft) || 0;
            var pr = parseFloat(fs.paddingRight) || 0;
            var contentLeft = fr.left + pl;
            var contentRight = fr.right - pr;

            var ml = Math.max(0, Math.round(hr.left - contentLeft));
            var mr = Math.max(0, Math.round(contentRight - hr.right));

            footerInnerEl.style.marginLeft = ml + 'px';
            footerInnerEl.style.marginRight = mr + 'px';
            footerInnerEl.style.maxWidth = 'none';
            footerInnerEl.style.width = 'auto';
            footerInnerEl.style.boxSizing = 'border-box';

            console.log('[qa:noads] footer aligned', { heroLeft: Math.round(hr.left), heroRight: Math.round(hr.right), ml: ml, mr: mr });
        } catch (e) {}
    }

    isLoadAds = isLoadAds && (getCookie('disableAd') === '' || getCookie('disableAd') === 'false');

    if (!isLoadAds) {
        document.querySelector('html.main-html').classList.add('ads-disabled');
        var __adSelector = __qaNoAds ? '.ad-section' : ('.ad-section' + (window.innerWidth < 1000 ? ':not(.top-ad)' : ''));
        var __removedAds = 0;
        document.querySelectorAll(__adSelector).forEach(function(element) {
            element.remove();
            __removedAds += 1;
        });
        if (__qaNoAds) {
            console.log('[qa:noads] removed ad sections at load', __removedAds);
            try {
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        __qaAlignFooterToHero();
                        try { window.__QA_NOADS_READY__ = true; } catch (e) {}
                    });
                });
            } catch (e) {
                __qaAlignFooterToHero();
                try { window.__QA_NOADS_READY__ = true; } catch (e2) {}
            }
        }
    }

    if (isDarkMode) {
        try {
            ga('send', {
                hitType: 'event',
                eventCategory: 'Explore',
                eventAction: minifyPageName(pageName) + 'sys DM on',
                eventLabel: pageName
            });
        } catch (e) {}
    }

    if ((isDarkMode && typeof localStorage['dark'] === 'undefined') || localStorage['dark'] == true || localStorage['dark'] === 'true') {
        htmlRoot.className += ' dark';
        darkTgl ? (darkTgl.checked = true) : '';
    }

    if (darkTgl.checked) {
        try {
            ga('send', {
                hitType: 'event',
                eventCategory: 'Explore',
                eventAction: minifyPageName(pageName) + 'DM onload',
                eventLabel: pageName
            });
        } catch (e) {}
    }

    darkTgl ? darkTgl.addEventListener('change', (event) => {
        if (event.currentTarget.checked) {
            document.getElementsByTagName('html')[0].className += ' dark';
            mainNav.classList.add('w3-white');
            localStorage['dark'] = true;
        } else {
            document.getElementsByTagName('html')[0].classList.remove('dark');
            mainNav.classList.remove('w3-white');
            localStorage['dark'] = false;
        }
    }) : '';

    const MAX_DUR_SEC_ULD_EACH_FILE = 30;
    const AVG_FILE_PRC_DUR_SEC = 8;
    const DOWN_AND_UP_RATIO = 1.5;
    const AVG_FILE_SIZE_MB = 3;
    const TEST_ULD_SIZE_MB = 1;
    const DEFAULT_ULD_PARALLEL = 4;
    var IS_ADS_INIT = false;
</script>
<script src="https://dkbg1jftzfsd2.cloudfront.net/script/lib/jquery/1.12.4/jquery.min.js"></script>
<script>
    $(document).ready(function() {
        startScripts();
        $(document).on("click dblclick mousedown mouseup mousemove mouseenter mouseleave keydown keyup touchstart touchmove touchend", function(event) {
            try {
                if (IS_ADS_INIT == false) {
                    IS_ADS_INIT = true;
                    isLoadAds = isLoadAds && $('.ad-section > .adsbygoogle:visible').length > 0;
                    if (isLoadAds && getParamValue('noads') == null) {
                        loadAds();
                    } else {
                        document.querySelectorAll('.ad-section' + (w_winds < 1000 ? ':not(.top-ad)' : '')).forEach(function(element) {
                            element.remove();
                        });
                    }
                }
            } catch (e){}
        });

        if (!isLoadAds || getParamValue('noads') == null) {
            $('html.main-html').removeClass('ads-init');
        }
    });
</script>
