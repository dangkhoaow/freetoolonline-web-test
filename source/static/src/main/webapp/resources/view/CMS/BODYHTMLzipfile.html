<div class='step step2 w3-container'>
    <div class='w3-row w3-container'>
        <button type='button' id='zipBtn' class='w3-button w3-red'>Zip</button>
    </div>
</div>
<div class="w3-modal" id="settings">
    <div class="w3-modal-content" style="padding: 10px; padding-top: 40px">
        <span onclick="document.getElementById('settings').style.display='none'" class="w3-button w3-display-topright close-modal-btn">&times;</span>
        <div class='w3-container'>
            <div class="w3-display-topleft" style="left: 10px;top: 10px;color: #0066b3;">
                Settings
            </div>
            <div class='w3-container'>
                <div class='w3-row'>
                    <div class='w3-container w3-col'>
                        <p><label for='zipName'>Zip name</label><input type='text' id='zipName' class='w3-input w3-border'/></p>
                    </div>
                </div>
                <div class='w3-row'>
                    
                    <div class='w3-container w3-col'>
                        <p><label for='password'>Password</label><input type='text' id='password' class='w3-input w3-border' placeholder="password (optional, empty for none-password)"/></p>
                    </div>
                </div>
                <div class='w3-row'>
                    
                    <div class='w3-container w3-col'>
                        <p>
                            <label for="enMethod">Encrypt method (apply when zip with password)</label><br/>
                            <select class="w3-select" id='enMethod' style='width: 120px;'>
                                <option value="std" selected="selected">Standard</option>
                                <option value="aes128">AES-128</option>
                                <option value="aes256">AES-256</option>
                            </select>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
