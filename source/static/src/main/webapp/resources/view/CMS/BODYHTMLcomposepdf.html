<div class="w3-container">
    <div class="w3-panel w3-pale-green w3-leftbar w3-border-green" style="margin-top: 10px;">
        <p><b>Compose PDF online</b> lets you write content in a simple editor and export it as a clean PDF file.</p>
        <ol style="margin-top: 6px; margin-bottom: 6px;">
            <li>Type or paste your content into the editor.</li>
            <li>Enter a PDF name.</li>
            <li>Click <b>Submit</b> to generate the PDF.</li>
        </ol>
        <p style="margin-bottom: 0;"><b>Note:</b> Use <b>Reload</b> to reset the editor if formatting gets messy.</p>
    </div>
</div>

<div class='step step1'>
    <div class='w3-row'>
        <div class='w3-container' style='padding-right: 2px !important;'>
            <p>
                <textarea name='textarea' style='opacity: 0;height: 0px;' id='editor' class='editor w3-input w3-border'>My PDF contents are from <b><span style='color:rgb(0, 148, 133);'>freetoolonline.com</span></b></textarea>
            </p>
        </div>
    </div>
    <div class='w3-row align-bottom' style="margin-top: 10px">
        <div class='w3-container w3-twothird'>
            <input type='text' id='pdfName' class='w3-input w3-border'/>
        </div>
        <div class='w3-container w3-third'>
            <button type='button' id='submitContent' class='w3-button w3-red w3-right' >Submit</button>
            <button type='button' onclick='window.location.reload()' style='margin-right:5px;' class='w3-button w3-red w3-right'>Reload</button>
        </div>
    </div>
</div>
