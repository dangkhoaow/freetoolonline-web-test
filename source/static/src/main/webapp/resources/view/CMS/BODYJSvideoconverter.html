<script>
    var originalFileName = null;
    var newDurationCached = 0,
        audioFormats = '.mp3 .aac .ogg .m4a .wma .flac .wav',
        isNotVideo = false,
        generateGifReview = function(){};
    function loadUploadHandlersByPage(){
        web.includesProcess = true;
        var onFileCompleteOrigin = onFileComplete;
        onFileComplete = function(e, file, response) {
            var response = onFileCompleteOrigin.call(this, e, file, response);
            try{
                if(web.fileInfoResult.length > 0){
                    originalFileName = null;
                    popularSliders(response, true);
                    generateGifReview(response);
                    var $step2 = $('.step2'),
                        $step3 = $('.step3');
                    $step3.show();
                    $step2.hide();
                    $("#autoWidth").prop('checked', false).change();
                    $("#autoHeight").prop('checked', false).change();
                } else {
                    $('.errorMsgAction').text('Error has occured').show();
                }
            } catch(e){
                $('.errorMsgAction').text('Error has occured').show();
            }
        };
        
        buildInputObjBeforeSend = function(inputObj) {
            inputObj["includeProcess"] = "true";
            return inputObj;
        };
        
        generateGifReview = function(response){
            if(originalFileName == null){
                originalFileName = response.originalName;
            }
            $('#convertBtn').text('Convert');
            var imgsOut = '', url = setOutputUrl(response, true);
            url = url.replace(response.customInputString, '.gif');
            $('.sourceImage').find('img').attr('src', url + "?t=" + getCurrentDateTime());
            $('#sizeC').text(response.fileSizeMb);
            var fileSizeMB = parseFloat($('#sizeC').text()).toFixed(2);
            $('#sizeC').text(fileSizeMB + 'KB');

            popularSliders(response, false);
            
            var directLnk = response.downloadUrl;
            $('.directLink').val(directLnk);
            $('#downloadButton').attr('href', directLnk);
            
            if(!isNotVideo){
                $('#nWidth').val(response.nWidth);
                $('#nHeight').val(response.nHeight);
            } else {
                $('.sizeContainer').find('input, button').attr('disabled', 'disabled');
            }
            
            $('#autoHeight').prop('checked', false);
            $('#autoWidth').prop('checked', false);
            $('#outputFormat select').val(response.customInputString);
        };
        
        function popularSliders(response, reset){
            var duration = $("#duration"),
                durationOut = $("#durationValue"),
                durationVal = response.duration,
                startPoint = $("#startPoint"),
                startPointOut = $("#startPointValue"),
                startPointVal = response.startPoint;
            duration.prop({'min' : 1, 'max' : (!reset && newDurationCached != 0 ? newDurationCached : durationVal)});
            
            if (reset){
                newDurationCached = 0;
            }
            
            startPoint.prop({'min' : startPointVal, 'max' : durationVal});
            
            if(reset || ($(duration).attr('oMax') === '' || typeof $(duration).attr('oMax') === 'undefined')){
                $(duration).attr('oMax', durationVal)
                duration.val(durationVal);
                durationOut.text(msToTime(durationVal));
                startPoint.val(startPointVal);
                startPointOut.text(msToTime(startPointVal));
            }			
        };
        
        var $step1 = $('.step1'),
        $step2 = $('.step2'),
        $step3 = $('.step3');
    
        var duration = document.getElementById("duration"),
            durationOut = document.getElementById("durationValue");
        var startPoint = document.getElementById("startPoint"),
            startPointOut = document.getElementById("startPointValue");

        duration.oninput = function() {
            durationOut.innerHTML = msToTime(this.value);
        }	
        
        startPoint.oninput = function() {
            startPointOut.innerHTML = msToTime(this.value);
            var newDuration = parseInt($(duration).attr('oMax')) - this.value;
            if(newDuration <= 0){
                newDuration = 100;
            }
            $(duration).prop({'max': newDuration});
            $(duration).val(newDuration);
            newDurationCached = newDuration;
            durationOut.innerHTML = msToTime(newDuration);
        }	
        
        $(document).on('click','#convertBtn',function() {
            var fileBase = web.fileInfoResult[web.fileInfoResult.length - 1];
            fileBase['nWidth'] = isNotVideo ? -1 : $.trim($('#nWidth').val());
            fileBase['nHeight'] = isNotVideo ? -1 : $.trim($('#nHeight').val());
            fileBase['inputDuration'] = $('#duration').val();
            fileBase['inputStartPoint'] = $('#startPoint').val();
            fileBase['customInputString'] = $('#outputFormat').val();
            if(originalFileName != null){
                fileBase['name'] = replaceSpecialChars(originalFileName);
            }
            var $this = $(this);
            $this.text('Converting');

            callAjax(fileBase, 
                    function(result){
                        generateGifReview(result);				
                    },
                    function(){
                        $this.text('Convert');
                    }
            );
        });
        
        
        $("#autoWidth").change(function(){
            if($(this).is(':checked')){
                $('#nWidth').val('0').attr('disabled', 'disabled');
                $('#autoHeight').attr('disabled', 'disabled');
            } else {
                $('#nWidth').val(web.fileInfoResult[web.fileInfoResult.length - 1].nWidth).attr('disabled', false);
                $('#autoHeight').attr('disabled', false);
            }
        });
        
        $("#autoHeight").change(function(){
            if($(this).is(':checked')){
                $('#nHeight').val('0').attr('disabled', 'disabled');
                $('#autoWidth').attr('disabled', 'disabled');
            } else {
                $('#nHeight').val(web.fileInfoResult[web.fileInfoResult.length - 1].nHeight).attr('disabled', false);
                $('#autoWidth').attr('disabled', false);
            }
        });
        
        $('#outputFormat').change(function(){
            if(audioFormats.indexOf($(this).val()) > -1 ) {
                $('.sizeContainer').find('input, button').attr('disabled', 'disabled');
                isNotVideo = true;
            } else {
                $('.sizeContainer').find('input, button').attr('disabled', false);
                isNotVideo = false;
            }
        });

        $(document).on('click','#copyDirectLinkButton',function() {
            copyToClipboard(document.getElementById("copyDirectLinkTarget"));
        });	
    };
    function doAfterPageRendered(){};
    
</script>
