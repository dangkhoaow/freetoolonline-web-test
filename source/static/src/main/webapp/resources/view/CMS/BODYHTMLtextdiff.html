<div id='formatEditor' class='w3-container'>
    <div class='w3-row w3-container'>
        <table id='editor'>
            <tr>
                <td contenteditable="true" id="a">https://freetoolonline.com/text-diff.html</td>
                <td contenteditable="true" id="b">https://freetoolonline.com</td>
                <td style="border-color: #f1f0f0 !important;overflow: auto;"><pre id="result"></pre></td>
            </tr>
        </table>
     </div>   
     <div class='w3-row w3-container'>
         <div id="settings">
             <label style="padding-left: 10px"><input class='w3-check' type="checkbox" id="showFullResult"> Result only</label>
            <label><input class='w3-radio' type="radio" name="diff_type" value="diffChars"> Char</label>
            <label><input class='w3-radio' type="radio" name="diff_type" value="diffWords"> Word</label>
            <label><input class='w3-radio' type="radio" name="diff_type" value="diffLines" checked> Line</label>
            <label style="text-align: center;padding-right: 10px"><a href="javascript:void(0)" class="prev">Prev</a> <a class="next" href="javascript:void(0)">Next</a> <a class="top" href="javascript:void(0)">Top</a></label>
        </div>
     </div>
</div>
