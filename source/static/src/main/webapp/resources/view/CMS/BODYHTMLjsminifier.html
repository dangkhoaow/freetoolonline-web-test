<div id='formatEditor' class='w3-container jsonParser' style='opacity: 0'>
    <div class='w3-row w3-container beautify'>
        <div class='w3-row'>
            <span style='display: none;color: red;' class='errorMsgAction'></span>
        </div>
        <div class='ui-editor'>
            <textarea class='input w3-input w3-border' id='javascriptInput' spellcheck='false' contenteditable='true'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='minifyButton' class='w3-button w3-red w3-left'>Minify</button>
            </div>
        </div>
        <div class='ui-editor'>
            <textarea readonly class='output w3-input w3-border' id='javascriptMinifiedResult' spellcheck='false' contenteditable='true'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='copyButton' class='w3-button w3-red w3-left'>Copy</button>
            </div>
        </div>
        <div class="w3-row stats w3-hide">
            <div class="w3-col w3-half">Original: <span id="oriSize"></span> kB</div>
            <div class="w3-col w3-quarter">Compressed: <span id="comSize"></span> kB (<span id="comPer"></span>%)</div>
            <div class="w3-col w3-quarter">Saving:     <span id="savSize"></span> kB (<span id="savPer"></span>%)</div>
        </div>
     </div>   
</div>
