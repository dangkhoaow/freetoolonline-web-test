<script>
    function doAfterJqueryUILoadDatePicker(){
        loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/lib/jquery/jquery-ui-timepicker-addon.js', function(){
            loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/lib/jquery/jquery-ui-sliderAccess.js', function(){
                loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/lib/date.format.js', function(){
                    $('#datetime').datetimepicker({
                        timeFormat: 'HH:mm:ss l',
                        addSliderAccess: true,
                        sliderAccessArgs: { touchonly: false }
                    });
                    
                    var today = new Date(),
                        dateString = today.format("mm/dd/yyyy HH:MM:ss l");
                    $('#datetime').val(dateString);
                    $('#convertBtn').on('click', function(){
                        var dateString = $('#datetime').val(),
                        dateTimeParts = dateString.split(' '),
                        timeParts = dateTimeParts[1].split(':'),
                        dateParts = dateTimeParts[0].split('/'),
                        date;
                    
                        date = new Date(dateParts[2], parseInt(dateParts[0], 10) - 1, dateParts[1], timeParts[0], timeParts[1], timeParts[2]);
                        
                        $('#millisecond').text(date.getTime() + parseInt(dateTimeParts[2]));
                    });
                    
                    $('#convertBtn').trigger('click');
                });
            });
        });
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/lib/jquery-ui-timepicker-addon.css');
    };
</script>
