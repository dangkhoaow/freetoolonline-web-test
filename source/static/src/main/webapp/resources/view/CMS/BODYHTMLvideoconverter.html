<div class="w3-container">
</div>

<div class='w3-row w3-container'>
    <label><b>Depends on your video duration, the converting process might takes within few seconds. Please patient! ^^</b></label>
</div>	
<div class='w3-container'>
    <div class='step step3'>
        <div class='w3-row w3-container'>
            <p class="w3-large" style="margin:4px 0;"><b>Review & Edit</b></p>
            <p>Uploaded successfully, the direct link or forum link has available now. You can edit your file that was uploaded from your video below.</p>
        </div>
        <div class='w3-row'>
            <div class='w3-container w3-half' style='margin-top: 30px;'>
                <p>
                    <label for='startPoint'>Start point at <span id='startPointValue'></span>:</label>
                    <input type='range' min='1' max='100' class='slider' id='startPoint'/>
                </p>
            </div>			
            <div class='w3-container w3-half' style='margin-top: 30px;'>
                <p>
                    <label for='duration'>Duration <span id='durationValue'></span>:</label>
                    <input type='range' min='1' max='100' class='slider' id='duration'/>
                </p>
            </div>
        </div>		
        <div class='w3-row align-bottom'>
            <div class='w3-third sizeContainer' >
                <div class='w3-row'>
                    <div class='w3-container w3-half' >
                        <p><label for='nWidth'><label><input type="checkbox" name="autoWidth" id="autoWidth" class='w3-check' style='margin-right: 5px;'/>AutoW</label></label><input type='text' id='nWidth' class='w3-input w3-border'/></p>
                    </div>
                    <div class='w3-container w3-half' >
                        <p><label for='nHeight'><label><input type="checkbox" name="autoHeight" id="autoHeight" class='w3-check' style='margin-right: 5px;'/>AutoH</label></label></label><input type='text' id='nHeight' class='w3-input w3-border'/></p>
                    </div>		
                </div>
            </div>
            <div class='w3-container w3-third' style='margin-top: 26px;line-height: 38px;'>
                <div class='w3-row align-bottom'>
                    <div class='w3-container w3-half' >
                        <p><label for='sizeC'>Size:</label><span id='sizeC'>N/A</span></p>
                    </div>
                    <div class='w3-container w3-half' >
                        <select class="w3-select" id='outputFormat' style='width: 150px;'>
                            <option value=".mp4" selected="selected">MP4</option>
                            <option value=".mov">MOV</option>
                            <option value=".flv">FLV</option>
                            <option value=".wmv">WMV</option>
                            <option value=".avi">AVI</option>
                            <option value=".mp3">MP3</option>
                            <option value=".aac">AAC</option>
                            <option value=".ogg">OGG</option>
                            <option value=".m4a">M4A</option>
                            <option value=".wma">WMA</option>
                            <option value=".flac">FLAC</option>
                            <option value=".wav">WAV</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class='w3-container w3-third'>
                <button type='button' id='convertBtn' class='w3-button w3-red w3-right'>Make</button>
            </div>				
        </div>
        <div class='step step2'>
            <div class='w3-row align-bottom'>
                <div class='w3-container w3-twothird' >
                    <label for='copyTarget'>Direct link</label><input type='text' id='copyDirectLinkTarget' class='w3-input w3-border directLink'/>
                </div>
                <div class='w3-container w3-third' >
                    <a target="_blank" id='downloadButton' class='w3-button w3-red w3-right fa fa-down'></a>
                    <button type='button' id='copyDirectLinkButton' class='w3-button w3-red w3-right' style='margin-right: 5px;'>Copy</button>
                </div>
            </div>
        </div>
        <div class='w3-row'>
                <div class='w3-container w3-twothird' >
                    <label for='copyTarget'>Simple review</label>
                </div>
        </div>
        <div class='w3-row'>
            <div class='w3-container sourceImage'>
                <img class='img' alt="Uploaded video preview"></img>
            </div>
        </div>
    </div>
</div>
