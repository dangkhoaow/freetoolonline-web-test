<script>
    function doAfterPageRendered(){
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/pdf/encrypt-by-password.css');
        var $step1 = $('.step1'),
            $step2 = $('.step2'),
            $step3 = $('.step3'),
            $password = $('#password');
        $password.val('password');
        $(document).on('click','#encryptBtn',function() {
            if(web.fileInfoResult.length <= 0){
                $step3.show();
                $step3.find('#downloadLink').text('Error has occur').css('color', 'red').removeAttr('href').removeAttr('target');
            }
            var oEncryptInfo = web.fileInfoResult[web.fileInfoResult.length - 1];
            oEncryptInfo['password'] = $password.val();
            var $btn = $('#encryptBtn');
            $btn.text('Encrypting');
            $step3.hide();
            
            callAjax(oEncryptInfo, 
                    function(result){
                        $btn.text('Encrypt');
                        $step3.show();
                        $step3.find('#downloadLink').attr('href', setOutputUrl(result, false));
                        $step3.find('#downloadLink').text('Click here to download');				
                    },
                    function(){
                        $btn.text('Encrypt');
                    }
            );
        });
    };
</script>
