<div class='w3-container'>
    <div class='w3-row outputImgs'>
        <div class="w3-col m2 col1"></div>
        <div class="w3-col m2 col2"></div>
        <div class="w3-col m2 col3"></div>
        <div class="w3-col m2 col4"></div>
        <div class="w3-col m2 col5"></div>
        <div class="w3-col m2 col6"></div>
    </div>
</div>

<div class="w3-modal" id="settings">
    <div class="w3-modal-content" style="padding: 10px; padding-top: 40px">
        <span onclick="document.getElementById('settings').style.display='none'" class="w3-button w3-display-topright close-modal-btn">&times;</span>
        <div class='w3-container'>
            <div class="w3-display-topleft" style="left: 10px;top: 10px;color: #0066b3;">
                Settings
            </div>
            <div  class='w3-row'>
                <div class='w3-container w3-row' >
                    <div class='w3-col' style='width: 250px;'>
                        Optimized jpeg quality (%): <span id="qualityValue"></span>
                    </div>
                    <div class='w3-rest' style='padding-top: 3px;padding-bottom: 3px;'>
                        <div id='slidecontainer'>
                          <input type='range' min='40' max='85' value='85' class='slider' id='quality'/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
