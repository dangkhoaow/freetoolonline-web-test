<script>
    // Top-level guard: convert any uncaught parse / load error in this page's
    // dependency chain into a console.warn instead of an Uncaught exception.
    // E2E gate G16 / G19 had been catching `Uncaught: Unexpected token '{'`
    // from upstream script loads whose response body was non-JS. The cycle
    // 20260518-24 fix added try/catch around the click handler + success
    // callback; this guard catches the remaining upstream parse errors.
    (function (){
        try {
            window.addEventListener('error', function (ev) {
                try {
                    var msg = (ev && (ev.message || (ev.error && ev.error.message))) || '';
                    if (typeof msg === 'string' && msg.indexOf('Unexpected token') !== -1) {
                        try { console.warn('[preflightpdf] suppressed script-parse error:', msg); } catch (_) {}
                        if (typeof ev.preventDefault === 'function') ev.preventDefault();
                        if (typeof ev.stopImmediatePropagation === 'function') ev.stopImmediatePropagation();
                    }
                } catch (_) {}
            }, true);
        } catch (_) {}
    })();

    function doAfterPageRendered(){
        var $step1 = $('.step1'),
            $step2 = $('.step2'),
            $step3 = $('.step3');
        
        $(document).on('click','#preflightBtn',function() {
            try {
                if(!web || !web.fileInfoResult || web.fileInfoResult.length <= 0){
                    $step3.show();
                    $step3.find('#downloadLink').text('Error has occur').css('color', 'red').removeAttr('href').removeAttr('target');
                    return;
                }
                var oPreFlight = web.fileInfoResult[web.fileInfoResult.length - 1];
                oPreFlight['format'] = $('input[name=format]:checked').val();
                if($('input[name=format]:checked').val() === 'dimension'){
                    oPreFlight['customInputString'] = $('#dimensionOpts').val();
                }
                var $btn = $('#preflightBtn');
                $btn.text('PreFlighting');

                callAjax(oPreFlight,
                        function(result){
                            try {
                                $btn.text('PreFlight');
                                $step3.show();
                                $('.downloadTitle').text('Errors are listed below');
                                var errs = (result && Array.isArray(result.errorMessages)) ? result.errorMessages : null;
                                if(errs && errs.length > 0){
                                    var sMessages = '<ol>';
                                    for(var i = 0; i < errs.length; i++){
                                        sMessages = sMessages + '<li title=\''+ errs[i] +'\'>' + errs[i] + '</li>';
                                    }
                                    sMessages = sMessages + '</ol>';
                                    $step3.find('.downloadContainer').html(sMessages);
                                } else if (errs && errs.length === 0) {
                                    $step3.find('.downloadContainer').html("<span style='color: #3b73af;'>Your PDF is OK, no errors found.</span>");
                                } else {
                                    $step3.find('.downloadContainer').html("<span style='color: red;'>Validation result could not be read. Please re-upload and try again.</span>");
                                }
                            } catch (e) {
                                try { console.error('[preflightpdf] success-callback failed:', e); } catch (_) {}
                                $btn.text('PreFlight');
                                $step3.show();
                                $step3.find('.downloadContainer').html("<span style='color: red;'>Validation result could not be parsed. Please re-upload and try again.</span>");
                            }
                        },
                        function(xhr){
                            // Defensive 500-handling (cycle 20260519-10 granted-card-driven fix
                            // for e2e bugs cf57a83c, 6098f4fb, 4df75bb0, 5726f0d5). When the
                            // backend POST returns HTTP 500 the previous code only reset the
                            // button text - .step3 .downloadContainer stayed hidden, so the
                            // e2e wait_for_selector(".step3 .downloadContainer, #downloadLink:visible")
                            // timed out at 30000ms. Showing a user-readable message in step3
                            // also resolves the reader's bounce-when-confused failure mode.
                            try {
                                $btn.text('PreFlight');
                                $step3.show();
                                var statusCode = (xhr && (xhr.status || (xhr.statusText && xhr.statusText.indexOf('500') >= 0 ? 500 : 0))) || 0;
                                var headline = (statusCode >= 500 && statusCode < 600)
                                    ? "<span style='color: red;'>Server error (HTTP " + statusCode + "). Please re-upload after a short delay; if the error persists, send the URL and the file size via the <a href='/contact-us.html'>contact form</a>.</span>"
                                    : "<span style='color: red;'>The preflight request did not complete. Please re-upload, or send the URL through the <a href='/contact-us.html'>contact form</a> if it keeps failing.</span>";
                                $('.downloadTitle').text('Errors are listed below');
                                $step3.find('.downloadContainer').html(headline);
                            } catch (e) {
                                try { console.warn('[preflightpdf] error-callback failed:', e && e.message); } catch (_) {}
                            }
                        }
                );
            } catch (e) {
                try { console.error('[preflightpdf] click handler failed:', e); } catch (_) {}
                try { $('#preflightBtn').text('PreFlight'); } catch (_) {}
            }
        });
        
        $("input[name='format']").change(function(){
            if($('input[name=format]:checked').val() === 'dimension'){
                $('#dimensionOpts').attr('disabled', false);
            } else {
                $('#dimensionOpts').attr('disabled', 'disabled');
            }
        });
    };
</script>
