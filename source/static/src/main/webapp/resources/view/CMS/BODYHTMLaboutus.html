<div class="dynamicContent" style='opacity: 0'></div>
<script>
function doAfterPageRendered(){
    $.ajax({
        context: this,
        dataType : "html",
        url : "https://dkbg1jftzfsd2.cloudfront.net/view/time-line.html",
        success : function(results) {
            $('.dynamicContent').html(results);
            $('.loading-tmp').hide();
            $('.dynamicContent').css('opacity', 1);
        }
    });
};
</script>
