<div class="w3-container">
    <div class="w3-panel w3-pale-green w3-leftbar w3-border-green" style="margin-top: 10px;">
        <p><b>Milliseconds to date converter</b> turns an epoch timestamp in milliseconds into a readable date and time.</p>
        <ol style="margin-top: 6px; margin-bottom: 6px;">
            <li>Paste a millisecond timestamp (13 digits) into the box.</li>
            <li>Click <b>Convert</b>.</li>
            <li>Copy the date/time output.</li>
        </ol>
        <p style="margin-bottom: 0;"><b>Note:</b> If your timestamp has 10 digits, it’s likely seconds—not milliseconds.</p>
    </div>
</div>

<div class='w3-container'>
    <div class='w3-row'>
        <div class='w3-container w3-twothird' >
            <p><input type='text' id='timeInMillisecond' class='w3-input w3-border' style="margin-bottom: 10px;"/></p>
        </div>
        <div class='w3-container w3-third'>	
            <button type='button' id='convertBtn' class='w3-button w3-red w3-right'>Convert</button>
        </div>
    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <p id='dateTime'></p>
        </div>
    </div>
</div>
