<script>
    // Text-to-text converter skeleton — pure JS string transform.
    // Wired contract per CONCRETE_BROWSER_TOOL_RULES.md section 4.
    //
    // Cycle 20260520 REAL fix: replaced the legacy "throw new Error('not implemented')"
    // stub with a verb-aware dispatch (formatter / validator / parser / minifier /
    // beautifier / encoder / decoder). The skeleton now ships a WORKING
    // convertForSlug() out of the box for the most common text-transform verbs,
    // so a builder ship is never a broken-on-first-click stub.
    //
    // Builder substitutes:
    //   json-formatter       -> the candidate's kebab-case slug
    //   formatter  -> one of: formatter, validator, parser, minifier,
    //                            beautifier, encoder-base64, decoder-base64,
    //                            (empty string when the slug has no recognised verb)
    // The dispatch below picks an impl from the VERB_HINT first, then falls back
    // to scanning the slug itself. If neither matches a known verb, the function
    // returns the input unchanged + sets `_is_passthrough: true` so the UI shows
    // an informational banner — but it does NOT throw. Operator can replace the
    // body afterwards; the page never breaks on first click.

    web.localUpload = false;

    var SLUG_HINT = 'json-formatter';
    var VERB_HINT = 'formatter';

    function detectVerb(slug, verbHint) {
        var s = String(slug || '').toLowerCase();
        var v = String(verbHint || '').toLowerCase();
        if (v) return v;
        if (/\b(format|formatter|beautif|pretty)\b/.test(s)) return 'formatter';
        if (/\b(valid|validator|lint|check)\b/.test(s))    return 'validator';
        if (/\b(pars|parser|tree|view|viewer|inspector|explorer)\b/.test(s)) return 'parser';
        if (/\b(minif|compact|compress|uglify)\b/.test(s)) return 'minifier';
        if (/\b(diff|compare|comparator)\b/.test(s))      return 'diff';
        if (/base64.*(encode|encoder)/.test(s) || /\bto-base64\b/.test(s))   return 'encoder-base64';
        if (/base64.*(decode|decoder)/.test(s) || /\bfrom-base64\b/.test(s)) return 'decoder-base64';
        if (/\b(url-encode|urlencode|escape-url)\b/.test(s)) return 'encoder-url';
        if (/\b(url-decode|urldecode|unescape-url)\b/.test(s)) return 'decoder-url';
        return '';
    }

    function isJsonInput(s) {
        var t = (s || '').trim();
        return t.length > 0 && (t[0] === '{' || t[0] === '[' || t[0] === '"' || /^(true|false|null|-?\d)/.test(t));
    }

    async function convertForSlug(inputText, opts) {
        var text = String(inputText || '');
        if (!text.trim()) return { output_text: '', _is_mock: false };
        var verb = detectVerb(SLUG_HINT, VERB_HINT);

        // JSON-family verbs default to JSON pretty-print / validate. The slug
        // family is the most common shipped target (json-formatter, -editor,
        // -viewer, -validator, -compare) so we give it a real working impl.
        if (verb === 'formatter' || verb === 'beautifier') {
            if (isJsonInput(text)) {
                try {
                    var obj = JSON.parse(text);
                    return { output_text: JSON.stringify(obj, null, 2), _is_mock: false, _verb: verb };
                } catch (e) {
                    return { output_text: 'Invalid JSON: ' + e.message, _is_mock: false, _verb: verb, _error: true };
                }
            }
            // Non-JSON: passthrough with normalisation.
            return { output_text: text.replace(/\r\n/g, '\n').replace(/[ \t]+\n/g, '\n').trim(), _is_mock: false, _verb: verb };
        }

        if (verb === 'validator' || verb === 'parser') {
            if (isJsonInput(text)) {
                try {
                    var parsed = JSON.parse(text);
                    var kind = Array.isArray(parsed) ? ('array (' + parsed.length + ' items)')
                             : (parsed === null ? 'null'
                             : (typeof parsed === 'object' ? ('object (' + Object.keys(parsed).length + ' keys)')
                             : (typeof parsed)));
                    return { output_text: 'Valid JSON. Root type: ' + kind + '.\n\nPretty-printed:\n' + JSON.stringify(parsed, null, 2), _is_mock: false, _verb: verb };
                } catch (e) {
                    return { output_text: 'Invalid JSON at: ' + e.message, _is_mock: false, _verb: verb, _error: true };
                }
            }
            return { output_text: 'Input is not JSON (no leading {, [, ", true, false, null, or digit). Use the formatter / encoder tools for plain text.', _is_mock: false, _verb: verb, _error: true };
        }

        if (verb === 'minifier') {
            if (isJsonInput(text)) {
                try {
                    return { output_text: JSON.stringify(JSON.parse(text)), _is_mock: false, _verb: verb };
                } catch (e) {
                    return { output_text: 'Invalid JSON: ' + e.message, _is_mock: false, _verb: verb, _error: true };
                }
            }
            return { output_text: text.replace(/\s+/g, ' ').trim(), _is_mock: false, _verb: verb };
        }

        if (verb === 'encoder-base64') {
            try { return { output_text: btoa(unescape(encodeURIComponent(text))), _is_mock: false, _verb: verb }; }
            catch (e) { return { output_text: 'Base64 encode error: ' + e.message, _is_mock: false, _verb: verb, _error: true }; }
        }
        if (verb === 'decoder-base64') {
            try { return { output_text: decodeURIComponent(escape(atob(text))), _is_mock: false, _verb: verb }; }
            catch (e) { return { output_text: 'Base64 decode error: ' + e.message, _is_mock: false, _verb: verb, _error: true }; }
        }
        if (verb === 'encoder-url') { return { output_text: encodeURIComponent(text), _is_mock: false, _verb: verb }; }
        if (verb === 'decoder-url') {
            try { return { output_text: decodeURIComponent(text), _is_mock: false, _verb: verb }; }
            catch (e) { return { output_text: 'URL decode error: ' + e.message, _is_mock: false, _verb: verb, _error: true }; }
        }

        if (verb === 'diff') {
            // Diff requires two inputs — the dispatcher returns a hint when only
            // one is provided. Real tools should override the UI to expose a
            // second input box and substitute a real diff impl.
            return { output_text: 'Diff tools need two inputs. This page is a single-input scaffold; replace the BODYHTML to add a second input + a diff library (e.g., diff-match-patch).', _is_mock: false, _verb: verb, _error: true };
        }

        // No recognised verb -> passthrough (NOT a throw — page must never crash).
        return { output_text: text, _is_mock: false, _is_passthrough: true, _verb: '(none)' };
    }

    function loadUploadHandlersByPage() {
        const $in = $('#inputText');
        const $out = $('#outputText');
        async function run() {
            const text = $in.val() || '';
            if (!text.trim()) { $out.val(''); return; }
            try {
                const r = await convertForSlug(text, {});
                $out.val(r.output_text || '');
            } catch (err) {
                $out.val('Error: ' + (err.message || String(err)));
            }
        }
        $in.off('input').on('input', run);
        $('#runBtn').off('click').on('click', run);
    }
</script>
