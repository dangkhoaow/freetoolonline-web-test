<script>
    function doAfterPageRendered(){
        loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/lib/date.format.js', function(){
            $('#convertBtn').on('click', function(){
                var date = new Date(+$('#timeInMillisecond').val());
                $('#dateTime').html('The datetime after converted from your millisecond: <b>' + date.format('mm/dd/yyyy HH:MM:ss l') + '</b>');
            });
            $('#timeInMillisecond').val((new Date()).getTime());
            $('#convertBtn').click();
            $('#timeInMillisecond').focus();
        });
    };
</script>
