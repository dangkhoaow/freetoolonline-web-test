<div class='w3-container'>
    <div class='w3-container'>
        Special thanks <a href="https://www.ffmpeg.org/" target="_blank" class="extrnl">FFmpeg</a> - The real one for video conversions and editing.<br/>
        <b>NOTE:</b> The <b>Slash</b> character is <b>not</b> allowed to execute your FFmpeg command
    </div>
</div>

<div class='step step2 w3-container'>
    <div class='w3-row settings'>
        <div class='w3-container w3-third' >
            <span class='stepHeading'>FFmpeg command:</span>
        </div>
    </div>
    <div class='w3-row settings'>
        <div class='w3-threequarter' >
            <div class='w3-row'>
                <div class='w3-container w3-half'>
                    <div class='w3-row'>
                        <div class='w3-third' style='line-height: 35px;'>
                            <select class="w3-select" id='rootCmd' style='width: 60px;'>
                                <option value="ffmpeg" selected="selected">ffmpeg</option>
                                <option value="ffprobe">ffprobe</option>
                            </select>
                        </div>
                        <div class='w3-third'>
                            <input type='text' id='params1' placeholder="Enter params (optional)" class='w3-input w3-border' value='-i'/>
                        </div>
                        <div class='w3-third' style='line-height: 38px;'>
                            <span class='inputFile' title='Your input file'></span>
                        </div>
                    </div>
                </div>
                <div class=' w3-quarter'>
                    <input type='text' id='params2' placeholder="Enter params (optional)" class='w3-input w3-border'/>
                </div>
                <div class=' w3-quarter'>
                    <input type='text' id='outFileName' placeholder="Enter output file name (optional)" class='w3-input w3-border'/>
                </div>					
            </div>
        </div>			
        <div class=' w3-quarter'>	
            <button type='button' id='execBtn' class='w3-button w3-red  w3-right'>Execute</button>
        </div>
    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <p>Note: You can enter your parameters as well as your output file depends on your expectation. 
            </br>Final command is: <b id='finalCmd'></b>
            </p>
        </div>
    </div>
</div>
