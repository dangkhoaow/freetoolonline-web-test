<script>
    function doAfterJqueryUILoadToolTip(){
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/utility/json-parser-v3.css?v=' + APP_VERSION);
        $('.jsonParser #editor,.jsonParser .ui-aside').css('height', 100);
        loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/utility/json-parser.js?v=' + APP_VERSION, function(){
            $('.loading-tmp').hide();
            var heightAdjust = $(window).height();
            
            if ($(window).width() < 768) {
                heightAdjust = parseInt($(window).outerHeight() - ($('.ccInfo').outerHeight() + $('.tagsTag').outerHeight() + $('.welcomeTag').outerHeight() + $('.shareBtns').outerHeight() + $('header').outerHeight() + $('.ui-option').outerHeight() + 10 ));
                if(heightAdjust < 510){
                    heightAdjust = 510;
                }
            } else {
                heightAdjust = heightAdjust - 180;
            }

            $('.jsonParser #editor,.jsonParser .ui-aside').css('height', heightAdjust);
            $('.jsonParser .ui-aside .ui-treeview').css('height', heightAdjust - 2);
            $('.jsonParser').css('opacity', 1);
        });

        $(document).on('click','#copyBeautifyJson',function() {
            if ($('.ui-notification.status-error').length == 0) {
                document.getElementById("editor").value = JSON.stringify(JSON.parse(document.getElementById("editor").value), null, '\t');
                copyToClipboard(document.getElementById("editor"));
            } else {
                alert('Can not copy error JSON!!!');
            }
        });
    };
</script>
