<div class="w3-container">
</div>
<div class='w3-container'>
    <div  class='w3-row fullscreen-container'>
        <div class='w3-container w3-half' style='margin-bottom: 5px'>
            <label>
                <input checked class='w3-check' type='checkbox' id='full' style="float: left;margin-right: 5px;margin-top: -6px;">Test in full screen mode
            </label>
        </div>
    </div>
    <div class='w3-row w3-container btnContainer'>
            <button type='button' onclick="openFullscreen('red');" class='w3-button colorBtn' style='margin-top: 5px;background-color: red!important;color:#fff;' title='Click to test fullscreen red'>Red</button>
            <button type='button' onclick="openFullscreen('green');" class='w3-button colorBtn' style='margin-top: 5px;background-color: green!important;color:#fff;' title='Click to test fullscreen green'>Green</button>
            <button type='button' onclick="openFullscreen('blue');" class='w3-button colorBtn' style='margin-top: 5px;background-color: blue!important;color:#fff;' title='Click to test fullscreen blue'>Blue</button>
            <button type='button' onclick="openFullscreen('black');" class='w3-button colorBtn' style='margin-top: 5px;background-color: black!important;color:#fff;' title='Click to test fullscreen black'>Black</button>
            <button type='button' onclick="openFullscreen('white');" class='w3-button colorBtn' style='margin-top: 5px;background-color: white!important;color:#000;' title='Click to test fullscreen white'>White</button>
            <button type='button' onclick="openFullscreen('yellow');" class='w3-button colorBtn' style='margin-top: 5px;background-color: yellow!important;color:#000;' title='Click to test fullscreen yellow'>Yellow</button>
            <button type='button' onclick="reset();" class='w3-button colorBtn' style='margin-top: 5px;background-color: white!important;color:#000;' title='Click to reset'>Reset</button>
    </div>	
    <div class='w3-row'>
        <div class='w3-container' >
        </div>
    </div>
</div>
<div class='w3-container'>
    <div  class='w3-row'>
        <div class='w3-container' style='margin-bottom: 5px'>
            <p class="w3-bar-block w3-center" style="font-size:1.05rem;font-weight:600;margin:4px 0;">Your viewport size<br/><b><span id="viewport">-x-</span></b></p>
            <p class="w3-bar-block w3-center" style="font-size:1.05rem;font-weight:600;margin:4px 0;">Your screen resolution<br/><b><span id="resolution">-x-</span></b></p>
            <p class="w3-bar-block w3-center" style="font-size:1.05rem;font-weight:600;margin:4px 0;">Your native screen resolution<br/><b><span id="real-resolution">-x-</span></b></p>
        </div>
        <script>
            try {
                var resolutionEl = document.getElementById("resolution");
                var viewportEl = document.getElementById("viewport");
                var realResolutionEl = document.getElementById("real-resolution");

                resolutionEl.innerText = window.screen.width + "x" + window.screen.height;
                viewportEl.innerText = window.innerWidth + "x" + window.innerHeight;
                realResolutionEl.innerText = (window.screen.width * window.devicePixelRatio) + "x" + (window.screen.height * window.devicePixelRatio);
            } catch (e) {}
        </script>
    </div>
</div><br/>
<div id='myFullscreen' style='width:0px; heigth: 0px; background-color: #fff;'></div>
