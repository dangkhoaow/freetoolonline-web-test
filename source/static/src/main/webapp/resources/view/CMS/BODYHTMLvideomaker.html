<div class='w3-row w3-container'>
    <div class='w3-half w3-container'>
        <label>
            <input class='w3-check' checked="checked" type='checkbox' id='includeAudio' style="float: left;margin-right: 5px;margin-top: -6px;">Include audio
        </label>			
    </div>	
</div>	

<div class='w3-row w3-container'>
    <label><b>Depends on number of images your are using, the making process might takes within few seconds. Please patient! ^^</b></label>
</div>
<div class='w3-container'>
    <div class='step step2'>
        <div class='w3-row w3-container'>
            <h6>Review & Edit</h6>
            <p>Uploaded successfully, the direct link or forum link has available now. You can edit your file that was uploaded from your video below.</p>
        </div>			
        <div class='w3-row settings'>
            <div class='w3-container w3-col s9'>
                <div class='w3-row'>
                    <div class='w3-quarter options'>
                        <p style="line-height: 42px;"><label for='sizeC'>File size:</label><span id='sizeC'>N/A</span></p>
                    </div>
                    <div class='w3-quarter options' >
                        <label><input checked="checked" type="checkbox" name="outputSize" id="outputSize" class='w3-check' style='margin-right: 5px;'/>Size:</label>
                        <select class="w3-select" id='outputResolution' style='width: 150px;'>
                            <option value="320x240" selected="selected">320x240 (4:3)</option>
                            <option value="800x600">800x600 (4:3)</option>
                            <option value="1024x768">1024x768 (4:3)</option>
                            <option value="1280x960">1280x960 (4:3)</option>
                            <option value="1400x1050">1400x1050 (4:3)</option>
                            
                            <option value="426x240">426x240 (16:9)</option>
                            <option value="640x360">640x360 (16:9)</option>
                            <option value="848x480">848x480 (16:9)</option>
                            <option value="1280x720">1280x720 (16:9)</option>
                            <option value="1600x900">1600x900 (16:9)</option>
                            
                            <option value="1280x800">1280x800 (16:10)</option>
                            <option value="1440x900">1440x900 (16:10)</option>
                            <option value="1680x1050">1680x1050 (16:10)</option>
                        </select>
                    </div>
                    <div class='w3-quarter options' >
                        <label for='frameDuration'>Frame duration:</label>
                        <select class="w3-select" id='frameDuration' style='width: 50px;'>
                            <option value="1">1s</option>
                            <option value="2">2s</option>
                            <option value="3" selected="selected">3s</option>
                            <option value="4">4s</option>
                            <option value="5">5s</option>
                        </select>
                    </div>
                    <div class='w3-quarter options' >
                        <label for='frameDuration'>Effect</label>
                        <select class="w3-select" id='effect' style='width: 60px;'>
                            <option value="fade" selected="selected">Fade</option>
                            <option value="zoom">Zoom</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class='w3-container w3-col s3'>
                <button type='button' id='convertBtn' class='w3-button w3-red w3-right'>Make</button>
            </div>				
        </div>
        <div class='links' style='display: none;'>
            <div class='w3-row align-bottom'>
                <div class='w3-container w3-twothird' >
                    <label for='copyTarget'>Direct link</label><input type='text' id='copyDirectLinkTarget' class='w3-input w3-border directLink'/>
                </div>
                <div class='w3-container w3-third' >
                    <a target="_blank" id='downloadButton' class='w3-button w3-red w3-right fa fa-down'></a>
                    <button type='button' id='copyDirectLinkButton' class='w3-button w3-red w3-right' style='margin-right: 5px;'>Copy</button>
                </div>
            </div>
        </div>
        <div class='w3-row links' style="display: none;">
                <div class='w3-container w3-twothird' >
                    <label for='copyTarget'>Simple review</label>
                </div>
        </div>
        <div class='w3-row'>
            <div class='w3-container sourceImage'>
                <img class='img' alt="Generated video preview"></img>
            </div>
        </div>
    </div>
</div>
