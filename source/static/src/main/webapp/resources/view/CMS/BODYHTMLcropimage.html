<div class='w3-container'>
    <div class='step step3'>
        <div class='w3-row w3-container'>
              <!-- Content -->
              <div class="container" style='opacity: 0;'>
                <div class="row">
                  <div class="col">
                    <div class="img-container">
                      <img loading="lazy" id="image" src="#" alt="Picture">
                    </div>
                  </div>
                </div>
                <div class="row">   
                  <div class="col">
                          <label>Preview</label>
                        <div class="docs-preview clearfix">
                          <div class="img-preview preview-lg"></div>
                        </div>
                  </div>
                  <div class="col ml-4 p-0 mr-3" style="max-width: 200px; min-width: 200px; width: 200px">
                    <label>Set crop box size below:</label>
                    <div class="docs-data">
                      <div class="input-group input-group-sm" style="margin-bottom: .45rem;">
                        <span class="input-group-prepend">
                          <label class="input-group-text" for="dataX">X</label>
                        </span>
                        <input type="text" class="form-control cropBoxInfo" id="dataX" placeholder="x">
                        <span class="input-group-append">
                          <span class="input-group-text">px</span>
                        </span>
                      </div>
                      <div class="input-group input-group-sm" style="margin-bottom: .45rem;">
                        <span class="input-group-prepend">
                          <label class="input-group-text" for="dataY">Y</label>
                        </span>
                        <input type="text" class="form-control cropBoxInfo" id="dataY" placeholder="y">
                        <span class="input-group-append">
                          <span class="input-group-text">px</span>
                        </span>
                      </div>
                      <div class="input-group input-group-sm" style="margin-bottom: .45rem;">
                        <span class="input-group-prepend">
                          <label class="input-group-text" for="dataWidth">Width</label>
                        </span>
                        <input type="text" class="form-control cropBoxInfo" id="dataWidth" placeholder="width">
                        <span class="input-group-append">
                          <span class="input-group-text">px</span>
                        </span>
                      </div>
                      <div class="input-group input-group-sm" style="margin-bottom: .45rem;">
                        <span class="input-group-prepend">
                          <label class="input-group-text" for="dataHeight">Height</label>
                        </span>
                        <input type="text" class="form-control cropBoxInfo" id="dataHeight" placeholder="height">
                        <span class="input-group-append">
                          <span class="input-group-text">px</span>
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
                <div class='w3-row'>
                    <div class="w3-col">
                        <div class="btn-group ratio docs-toggles">
                              <label class="w3-button w3-gray" title='Crop by 16:9 ratio'>
                                <input type="radio" class="sr-only" id="aspectRatio0" name="aspectRatio" value="1.7777777777777777">
                                <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                  16:9
                                </span>
                              </label>
                              <label class="w3-button w3-gray" title='Crop by 4:3 ratio'>
                                <input type="radio" class="sr-only" id="aspectRatio1" name="aspectRatio" value="1.3333333333333333">
                                <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                  4:3
                                </span>
                              </label>
                              <label class="w3-button w3-gray" title='Crop by 1:1 ratio'>
                                <input type="radio" class="sr-only" id="aspectRatio2" name="aspectRatio" value="1">
                                <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                  1:1
                                </span>
                              </label>
                              <label class="w3-button w3-gray" title='Crop by 2:3 ratio'>
                                <input type="radio" class="sr-only" id="aspectRatio3" name="aspectRatio" value="0.6666666666666666">
                                <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                  2:3
                                </span>
                              </label>
                              <label class="w3-button w3-gray active" title='Crop by custom ratio'>
                                <input type="radio" class="sr-only" id="aspectRatio4" name="aspectRatio" value="NaN">
                                <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                  Free
                                </span>
                              </label>
                         </div>
                      </div>
                    </div>
                    <div class="w3-row"> 
                      <div class="w3-col">
                              <div class="btn-group docs-buttons" style='padding: 0 !important;'>
                                  <button type="button" class="w3-button w3-gray setDragMode" data-method="setDragMode" data-option="move" title="Move">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false" title="Set drag mode to move">
                                      <span class="fa fa-arrows"></span>
                                    </span>
                                  </button>
                                  <button type="button" class="w3-button w3-gray setDragMode" data-method="setDragMode" data-option="crop" title="Crop">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false" title="Set drag mode to crop">
                                      <span class="fa fa-crop"></span>
                                    </span>
                                  </button>
                                  <button type="button" class="w3-button w3-gray rotate" data-method="rotate" data-option="-45" title="Rotate Left">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false" title="Rotate 45 degree by left">
                                      <span class="fa fa-rotate-left"></span>
                                    </span>
                                  </button>
                                  <button type="button" class="w3-button w3-gray rotate" data-method="rotate" data-option="45" title="Rotate Right">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false" title="Rotate 45 degree by right">
                                      <span class="fa fa-rotate-right"></span>
                                    </span>
                                  </button>
                              </div>
                      </div>
                  </div>
                  <div class='w3-row' style='margin-top: 6px;'>
                      <div class="w3-half">
                              <div class="btn-group docs-buttons" style='padding: 0 !important;'>
                                   <button type="button" class="w3-button w3-gray zoomBtn" data-method="zoom" data-option="0.1" title="Zoom In">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                      <span class="fa fa-search-plus"></span>
                                    </span>
                                  </button>
                                  <button type="button" class="w3-button w3-gray zoomBtn" data-method="zoom" data-option="-0.1" title="Zoom Out">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                      <span class="fa fa-search-minus"></span>
                                    </span>
                                  </button>
                                  <label style='margin-right: 0px;'>
                                        <select class="w3-select" id='outputFormat' style='width: 60px;height: 35px;'>
                                            <option value="jpg" selected="selected">JPG</option>
                                            <option value="png">PNG</option>
                                            <option value="webp">WEBP</option>
                                        </select> <span style="color: transparent;">.</span>
                                    </label>
                                    <button style='margin-right: 5px;' type="button" class="w3-button w3-red" data-method="getCroppedCanvas">
                                    <span class="docs-tooltip" data-toggle="tooltip" data-animation="false">
                                      Download
                                    </span>
                                  </button>
                              </div>
                      </div>
                  </div>
              </div>
        </div>
    </div>

</div>
