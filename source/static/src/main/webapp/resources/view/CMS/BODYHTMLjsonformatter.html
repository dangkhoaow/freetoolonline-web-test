<div class="w3-container">
    <p>Paste a JSON payload below and click <b>JSON Formatter Online</b>. The tool pretty-prints (2-space indent) and validates the JSON entirely in your browser - nothing is uploaded. Use the Copy button to grab the formatted output.</p>
</div>

<div id='formatEditor' class='w3-container jsonParser' style='opacity: 1'>
    <div class='w3-row w3-container beautify'>
        <div class='ui-editor'>
            <textarea class='input w3-input w3-border' id='inputText' spellcheck='false' placeholder='Paste your JSON payload here, then click "JSON Formatter Online".' style='min-height: 220px; font-family: monospace; font-size: 13px;'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='convertButton' class='w3-button w3-red w3-left'>JSON Formatter Online</button>
                <button style='margin-top: 10px !important;margin-left: 8px !important;float: left !important;' type='button' id='clearInputButton' class='w3-button w3-light-grey w3-left'>Clear</button>
            </div>
        </div>
        <div class='ui-editor'>
            <textarea readonly class='output w3-input w3-border' id='outputText' spellcheck='false' placeholder='Formatted JSON will appear here.' style='min-height: 220px; font-family: monospace; font-size: 13px;'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='copyOutputButton' class='w3-button w3-red w3-left'>Copy Output</button>
            </div>
        </div>
        <div class="w3-row stats w3-hide">
            <div class="w3-col w3-half">Input: <span id="oriSize"></span> bytes</div>
            <div class="w3-col w3-half">Output: <span id="outSize"></span> bytes</div>
        </div>
    </div>
</div>
