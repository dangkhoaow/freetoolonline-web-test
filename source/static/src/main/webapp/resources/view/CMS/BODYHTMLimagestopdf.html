<div class='step step2 w3-container'>
    <div class='w3-row'>
        <div class='w3-container'>
            <span class='stepHeading'>Step 2: Enter the PDF name</span>

        </div>
    </div>
    <div class='w3-row align-bottom'>
        <div class='w3-container w3-third' >
            <p><input type='text' id='pdfName' class='w3-input w3-border'/> </p>

        <div class='w3-container w3-third'>

                <option value="621x810">8.5x11 - Magazines</option>
                
                <option value="441x666">6x9 - Trade book</option>
                <option value="369x594">5x8 - Trade book</option>
                
                <option value="855x864">12x12 - Photo book</option>
                <option value="909x783" selected="selected">13x11 - Photo book</option>
                <option value="567x720">8x10 - Photo book</option>
                <option value="495x495">7x7 - Photo book</option>
                <option value="693x594">10x8 - Photo book</option>
                <option value="595x842">A4 - paper size</option>

        </div>
        <div class='w3-container w3-third'>
