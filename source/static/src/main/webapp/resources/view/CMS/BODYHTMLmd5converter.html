<div class="w3-container">
</div>
<div class='w3-row w3-container'>
    <div class='w3-container'>
        <p class="w3-large" style="margin:4px 0;"><b>Text to MD5</b></p>
        <p>Text to MD5: All of thing you need is paste to the textbox below and click 'To MD5' button.</p>
    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <span style='display: none;color: red;' class='errorMsgAction error1'></span>
        </div>
    </div>
    <div class='w3-row align-bottom'>
        <div class=' w3-twothird' >
            <p><textarea placeholder="Initializing, please wait..." type='text' id='pureString' class='w3-input w3-border' maxlength='990' style='height: 100px'></textarea></p>
        </div>
        <div class=' w3-third'>	
            <button type='button' disabled id='toMd5Btn' class='w3-button w3-red w3-right'>To MD5</button>
        </div>
    </div>
    <div class='w3-row' id="md5ResultContainer" style="margin-top: 10px;display: none;">
        <div class=" w3-twothird"> 
            <p id='md5Result'></p>
        </div>
        <div class=" w3-third"> 
            <button type="button" id="copyCBHashed" class="w3-button w3-red w3-right">Copy MD5</button> 
        </div>
    </div>
</div>
<hr/>
<div class='w3-row w3-container'>
    <div class='w3-container'>
        <p class="w3-large" style="margin:4px 0;"><b>MD5 to Text</b></p>
        <p>MD5 to text: All of thing you need is paste to the textbox below and click 'To Text' button.</p>
    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <span style='display: none;color: red;' class='errorMsgAction error2'></span>
        </div>
    </div>
    <div class='w3-row align-bottom'>
        <div class=' w3-twothird' >
            <p><input placeholder="Initializing, please wait..." type='text' id='hashedString' class='w3-input w3-border' maxlength='32'/></p>
        </div>
        <div class=' w3-third'>	
            <button type='button' disabled id='toTextBtn' class='w3-button w3-red  w3-right'>To Text</button>
        </div>
    </div>
    <div class="w3-row resultSection" style="display: none;">
        <br/>
        <div class="w3-row align-bottom">
            <div class=" w3-twothird"> 
                <p id="textResult"></p> 
            </div>
            <div class=" w3-third"> 
                <button type="button" id="copyCB" class="w3-button w3-red w3-right">Copy Text</button> 
            </div>
        </div>  
    </div>
</div>
<br/>
<script defer src="https://dkbg1jftzfsd2.cloudfront.net/script/lib/md5.min.js"></script>
