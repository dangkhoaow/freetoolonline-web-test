<script>
    function doAfterPageRendered(){
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/file/zip-file.css');
        var $step1 = $('.step1'),
            $step2 = $('.step2'),
            $step3 = $('.step3'),
            $password = $('#password');
        
        $password.val('password');
        
        $(document).on('click','#unzipBtn',function() {
            if(web.fileInfoResult.length <= 0){
                $step3.show();
                $step3.find('#downloadLink').text('Error has occur').css('color', 'red').removeAttr('href').removeAttr('target');
            }
            var $this = $(this),
                oRemoveZipPassInfo = web.fileInfoResult[0];
            oRemoveZipPassInfo['password'] = $password.val();
            $this.text('Removing');
            $step3.hide();
            
            callAjax(oRemoveZipPassInfo, 
                    function(result){
                        $this.text('Remove');
                        $step3.show();
                        $step3.find('#downloadLink').text('Click here to download');
                        $step3.find('#downloadLink').attr('href', setOutputUrl(result, false));				
                    },
                    function(){
                        $this.text('Remove');
                    }
            );
        });
    };
</script>
