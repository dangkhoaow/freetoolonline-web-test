<script>
    var currentIndex = -1;
    function doAfterPageRendered(){
        $('.new-style-nav-bar').append($('#settings').html());
        $('#settings').remove();
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/utility/text-diff.css');
        $('#editor').css('height', 100);
        loadScript('https://dkbg1jftzfsd2.cloudfront.net/script/lib/diff.min.js', function(){
            $('.loading-tmp').hide();
            $('#a,#b').css('color', '#333');
            var heightAdjust = parseInt($(window).outerHeight() - ($('.ccInfo').outerHeight() + $('.tagsTag').outerHeight() + $('.welcomeTag').outerHeight() + $('.shareBtns').outerHeight() + $('header').outerHeight()));
            if(heightAdjust < 530){
                heightAdjust = 530;
            }
            $('#editor').css('height', heightAdjust);
            $('#editor').css('opacity', 1);
            
            
            $('.prev').click(function(){
                currentIndex = currentIndex - 1;
                if (currentIndex < 0) currentIndex = 0;
                $("#result del,#result ins").css('font-weight', 'normal');
                $($("#result del,#result ins")[currentIndex]).css('font-weight', '800');
                $('html, body').animate({scrollTop: $($("#result del,#result ins")[currentIndex]).offset().top - 50}, 200);
            });
            
            $('.next').click(function(){
                currentIndex = currentIndex + 1;
                if (currentIndex >= $("#result del,#result ins").length) currentIndex = $("#result del,#result ins").length - 1;
                $("#result del,#result ins").css('font-weight', 'normal');
                $($("#result del,#result ins")[currentIndex]).css('font-weight', '800');
                $('html, body').animate({scrollTop: $($("#result del,#result ins")[currentIndex]).offset().top - 50}, 200);
            });				
            
            $('.top').click(function(){
                $('html, body').animate({scrollTop: 0}, 100);
            });	
            
            function changed() {
                var diff = null;
                if (window.diffType === "diffChars"){
                    diff = Diff.diffChars(a.textContent, b.textContent);
                } else if (window.diffType === "diffWords"){
                    diff = Diff.diffWords(a.textContent, b.textContent);
                } else if (window.diffType === "diffLines"){
                    diff = Diff.diffLines(a.textContent, b.textContent);
                }
                var fragment = document.createDocumentFragment();
                for (var i=0; i < diff.length; i++) {

                    if (diff[i].added && diff[i + 1] && diff[i + 1].removed) {
                        var swap = diff[i];
                        diff[i] = diff[i + 1];
                        diff[i + 1] = swap;
                    }

                    var node;
                    if (diff[i].removed) {
                        node = document.createElement('del');
                        node.appendChild(document.createTextNode(diff[i].value));
                    } else if (diff[i].added) {
                        node = document.createElement('ins');
                        node.appendChild(document.createTextNode(diff[i].value));
                    } else {
                        node = document.createTextNode(diff[i].value);
                    }
                    currentIndex = -1;
                    fragment.appendChild(node);
                }
                


                result.textContent = '';
                result.appendChild(fragment);
            };
            
            var a = document.getElementById('a');
            var b = document.getElementById('b');
            var result = document.getElementById('result');

            a.onpaste = a.onchange =
            b.onpaste = b.onchange = changed;

            if ('oninput' in a) {
                a.oninput = b.oninput = changed;
            } else {
                a.onkeyup = b.onkeyup = changed;
            }

            function onDiffTypeChange(radio) {
                window.diffType = radio.value;
            }

            var radio = document.getElementsByName('diff_type');
            for (var i = 0; i < radio.length; i++) {
                radio[i].onchange = function(e) {
                    $("input[name=diff_type2][value='" + e.target.value + "']").prop("checked",true);
                    onDiffTypeChange(e.target);
                    changed();
                }
            }
            
            var radio2 = document.getElementsByName('diff_type2');
            for (var i = 0; i < radio2.length; i++) {
                radio2[i].onchange = function(e) {
                    $("input[name=diff_type][value='" + e.target.value + "']").prop("checked",true);
                    window.diffType = e.target.value;
                    changed();
                }
            }

            onDiffTypeChange(document.querySelector('[name="diff_type"]:checked'));
            changed();
            
            $("#showFullResult").change(function() {
                if(this.checked) {
                    $(a).hide();
                    $(b).hide();
                } else {
                    $(a).show();
                    $(b).show();
                }
                $("#showFullResult2").prop('checked', this.checked);
            });
            
            $("#showFullResult2").change(function() {
                if(this.checked) {
                    $(a).hide();
                    $(b).hide();
                } else {
                    $(a).show();
                    $(b).show();
                }
                $("#showFullResult").prop('checked', this.checked);
            });
        });
    };
</script>
