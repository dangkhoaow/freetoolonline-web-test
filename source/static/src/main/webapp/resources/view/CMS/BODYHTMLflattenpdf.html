<div class='w3-container'>
    <div class='w3-row'>
        <div class='w3-container'>
            <span class='stepHeading'>PDF pages <span id='numberOfPages'>N/A</span></span>
        </div>
    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <p>Uploaded successfully, select the tool that you want to flatten and click the 'Flatten' button to start</p>
        </div>
    </div>
    <div class='w3-row align-bottom'>
        <div class='w3-container w3-half'>
            <div class="w3-row"> 
                <div class="w3-container w3-col s5"> 
                    <label><input class="w3-radio" type="radio" name="tool" value="im" checked="">ImageMagick</label> 
                </div>
                <div class="w3-container w3-responsive imOptsContainer"> 
                    <label> 
                        <select class="w3-select" id="outputDensityIM" style="width: 60px;"> 
                            <option value="72">72</option> 
                            <option value="100">100</option> 
                            <option value="150" selected="selected">150</option> 
                            <option value="300">300</option> 
                        </select> PDF density
                    </label> 
                </div>
            </div>
            <div class='w3-row'>
                <label><input class='w3-radio' type='radio' name='tool' value='gs'>GhostScript</label>	
            </div>
        </div>
        <div class='w3-container w3-half'>
            <button type='button' id='flatten' class='w3-button w3-red w3-right'>Flatten</button>
        </div>
    </div>
    <div class='w3-row w3-container gsOptsContainer'>
        <div class='w3-row'>
            Choose GhostScript Flattening options:
        </div>
        <div class='w3-row'>
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dAutoFilterColorImages" checked="checked" disabled="disabled"> Auto filter color images
                </label>
            </div>
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dAutoFilterGrayImages" checked="checked" disabled="disabled"> Auto filter gray images
                </label>
            </div>
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dDownsampleMonoImages" checked="checked" disabled="disabled"> Down sample mono images
                </label>
            </div>	
        </div>
        <div class='w3-row'>
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dDownsampleGrayImages" checked="checked" disabled="disabled"> Down sample gray images
                </label>
            </div>		
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dDownsampleColorImages" checked="checked" disabled="disabled"> Down sample color images
                </label>
            </div>
            <div class='w3-third'>
                <label>
                    <input type="checkbox" class='w3-check gsOpts' id="dConvertCMYKImagesToRGB" checked="checked" disabled="disabled"> Convert CMYK images to RGB
                </label>
            </div>
        </div>					

    </div>
    <div class='w3-row'>
        <div class='w3-container'>
            <p><b>NOTE:</b> The flatten pdf progress might takes some minutes depends on your pdf size.</p>
        </div>
    </div>
</div>
<br/>
