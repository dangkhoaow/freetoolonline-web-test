<script src="https://dkbg1jftzfsd2.cloudfront.net/script/lib/jszip.min.js"></script>

<div class='step step1 w3-container'>
    <div  class='w3-row'>
        <div class='w3-container w3-col' style="margin-bottom: 10px">
            <select class="w3-select" id='outputFormat' style='width: 220px;'>
                <option value="png" selected="selected">PNG</option>
                <option value="webp">WEBP (Recommended)</option>
                <option value="jpeg">JPG</option>
            </select> Select your expected format
        </div>
    </div>
</div>

<div class='w3-row align-bottom' style="margin-bottom: 10px">
    <div class='w3-container w3-half' >
        <p><label for='nWidth'>Custom Min Width(px)<br/>
            <span style="font-size: 12px">Blank for origin viewbox Width</span></label><input value="400" type="number" min="1" max="5000" id='nWidth' class='w3-input w3-border'/></p>
    </div>
    <div class='w3-container w3-half' >
        <p><label for='nHeight'>Custom Min Height(px)<br/>
            <span style="font-size: 12px">Blank for origin viewbox Height</span></label><input value="400" type="number" min="1" max="5000" id='nHeight' class='w3-input w3-border'/></p>
    </div>
</div>

<div class='w3-container'>
    <div class='w3-row outputImgs'>
        <div class="w3-col m2 col1"></div>
        <div class="w3-col m2 col2"></div>
        <div class="w3-col m2 col3"></div>
        <div class="w3-col m2 col4"></div>
        <div class="w3-col m2 col5"></div>
        <div class="w3-col m2 col6"></div>
    </div>
    <div class='w3-row w3-container pdfWorkingProgress'>
        <b>NOTE:</b> The output file may has the file size is more than original svg image (vector image always has the size is less than png or jpg image).
    </div>
</div>
