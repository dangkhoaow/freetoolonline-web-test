<script>
    var openFullscreen = function(){};
    var checkScreenRes = function(){
      var screenWidth = window.screen.width;
      var screenHeight = window.screen.height;
      $('#resolution').text(screenWidth + 'x' + screenHeight);

      var viewportWidth = window.innerWidth;
      var viewportHeight = window.innerHeight;
      $('#viewport').text(viewportWidth + 'x' + viewportHeight);

      screenWidth = window.screen.width * window.devicePixelRatio;
      screenHeight = window.screen.height * window.devicePixelRatio;
      $('#real-resolution').text(screenWidth + 'x' + screenHeight);
    };
    var windowResizeHandler = typeof windowResizeHandler === 'function' ? windowResizeHandler : function() {
      checkScreenRes();
      toggleFull();
    };

    var toggleFull = function() {};
    var reset = function() {};

    function doAfterPageRendered(){
        openFullscreen = function(color) {
            if (!$('#full').is(':checked')){
                $('html').css('background-color', color);
            } else {
                 var elem = document.getElementById("myFullscreen");
                  $(elem).css('background-color', color);
                  if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                  } else if (elem.mozRequestFullScreen) { 
                    elem.mozRequestFullScreen();
                  } else if (elem.webkitRequestFullscreen) { 
                    elem.webkitRequestFullscreen();
                  } else if (elem.msRequestFullscreen) { 
                    elem.msRequestFullscreen();
                  }
            }
        };

        toggleFull = function() {
          w_winds = $(window).width();
          if (w_winds < 821) {
            $('#full').prop('checked', false);
            $('.fullscreen-container').hide();
          } else {
            $('#full').prop('checked', true);
            $('.fullscreen-container').show();         
          }
        };

        reset = function() {
          $('html').removeAttr('style');
          $('html').css('background-image', 'inherit');
        }
        
        toggleFull();
    };
</script>
