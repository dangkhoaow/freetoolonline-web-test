<div class="w3-container">
    <div class="w3-panel w3-pale-green w3-leftbar w3-border-green" style="margin-top: 10px;">
        <p><b>PDF to text converter</b> extracts copyable text from a PDF so you can search, copy, or edit it.</p>
        <ol style="margin-top: 6px; margin-bottom: 6px;">
            <li>Upload your PDF file.</li>
            <li>Click <b>Convert</b> to extract the text.</li>
            <li>Copy or download the output.</li>
        </ol>
        <p style="margin-bottom: 0;"><b>Note:</b> If your PDF is a scanned image, it may not contain selectable text to extract.</p>
    </div>
</div>
<div class='w3-container'>
    <div class='step step2'>
        <div class='w3-row w3-container'>
            <span class='stepHeading'>PDF pages <span id='numberOfPages'>N/A</span></span>
        </div>
        <div class='w3-row'>
            <button type='button' id='convertBtn' class='w3-button w3-red ' >Convert</button>
        </div>
    </div>
</div>
