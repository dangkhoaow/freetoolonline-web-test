<style>
    /* cycle161 P161.A — force imgOutDownBtn visible regardless of hover.
       Same root-cause class as cycle97 P97.A (svgtopng), cycle159 P159.A
       (resizeimage), and cycle160 P160.A (heictojpg). The cloudfront default
       stylesheet sets `.imgOutDownBtn { visibility: hidden }` and only flips
       it on `:hover`, which mobile/touch users cannot trigger. The override
       below makes the per-thumbnail Download button always reachable AND
       satisfies Playwright `expect_visible: a.imageDownloadBtn` for G16. */
    .imageOut .imgOutDownBtn {
      visibility: visible !important;
      opacity: 1 !important;
    }
</style>
<script>
    function loadUploadHandlersByPage(){
        web.includesProcess = true;
        var onFileCompleteOrigin = onFileComplete;
        onFileComplete = function(e, file, response) {
            var response = onFileCompleteOrigin.call(this, e, file, response);
            try{
                if(typeof response != 'undefined' && response){
                    generateImgThumbs(response);
                }
            } catch(e){}
        };
        
        var onCompleteOrigin = onComplete;
        onComplete = function(e) {
            onCompleteOrigin.call(this, e);
            try{
                if(web.fileInfoResult.length > 1){
                    web.fileInfoResult[0]["pageName"] = "combine-output";
                    web.fileInfoResult[0]["outPutfileType"] = ".zip";
                    getStatus(web.fileInfoResult[0]);
                } else if(web.fileInfoResult.length == 0){
                    $('.errorMsgAction').text('Error has occured').show();
                }
            } catch(e){
                $('.errorMsgAction').text('Error has occured').show();
            }
        };
        
        buildInputObjBeforeSend = function(fileBase) {
            fileBase["inputFolder"] = "input";
            fileBase["includeProcess"] = "true";
            fileBase["outputFolder"] = "output";
            fileBase['outputType'] = 'svg';
            fileBase["outPutfileType"] = ".zip";
            $('.downloadBtnContainer').hide();
            return fileBase;
        };
        
        function getStatus(fileBase){
            callAjax(fileBase,
                function(result){
                    generateDownloadZip(result);
                },
                function(){
                    $('.errorMsgAction').text('An error occurred. Please try again.').show();
                    $('.downloadBtnContainer').hide();
                }
            );
        };
        
        function generateDownloadZip(result){
            if (result && result.downloadUrl && result.downloadUrl !== '') {
                $('.downloadBtnContainer').show().find('#downloadLink').attr('href', setOutputUrl(result, false));
                $('.downloadBtnContainer').show().find('#downloadLink').text('Download all svg images');
            } 
        };
        
        var recentCol = 1,
               temp = "<div title='Click here to download' id='imgOut-{0}' class='imageOut'>{1}<div class='w3-white imgOutDownBtn'><a class='w3-button w3-light-grey imageDownloadBtn' target='_blank' href='{2}'><span>Download<br/><i class='fa fa-photo'></i> {3}</span></button></div></div>";
        function generateImgThumbs(result){
                var imgsOut = '',
                    imgName = result.name,
                    viewUrl = result.thumbUrl + "";
                
                imgsOut = imgsOut + String.format(temp, imgName, result.customOutputString, result.downloadUrl, result.name);
                
                if (imgsOut !== '') {
                    if (recentCol < $('.outputImgs .w3-col').length){
                        recentCol = recentCol + 1;
                    } else {
                        recentCol = 1;
                    }
                    $('.col' + recentCol).append(imgsOut);
                }
        };
    };
    function doAfterPageRendered(){
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/convert/png-to-svg.css');
        $('.downloadBtnContainer').hide();
    };
</script>
